<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Secure Link...</title>
    <!-- Importing a clean, modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1f2937;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .icon-container {
            width: 70px;
            height: 70px;
            background-color: #d1fae5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }

        /* Shield Icon SVG styling */
        .shield-icon {
            width: 35px;
            height: 35px;
            fill: #10b981;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #111827;
        }

        p {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background-color: #10b981; /* Trustworthy Green */
            width: 0%;
            /* 3 Second Animation */
            animation: load 3s linear forwards;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .status-text {
            font-size: 12px;
            color: #10b981;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .status-text svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Trustworthy Shield Icon -->
        <div class="icon-container">
            <svg class="shield-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
            </svg>
        </div>

        <h2>Link is Secure</h2>
        <p>Please wait a moment while we prepare your safe destination. You will be redirected shortly.</p>

        <!-- Loading Animation -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <!-- Safe Status Indication -->
        <div class="status-text" id="status-text">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            Scanning for safety...
        </div>
    </div>

    <script>
        // Change text slightly before redirecting to increase trust
        setTimeout(() => {
            document.getElementById('status-text').innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                100% Verified. Redirecting!
            `;
        }, 2500);

        // Redirect strictly after 3 seconds (3000 milliseconds)
        setTimeout(function() {
            window.location.href = "https://earnlinks.in/GOUP1";
        }, 3000);
    </script>

</body>
</html>
